<div class="resume-page">
    <div class="container">
        <div class="resume-title-row">
            <h1 class="resume-title">Resume</h1>
            <span class="resume-badge" id="resume-last-updated">Loading...</span>
        </div>
        <p class="resume-description">My complete academic and professional resume.</p>
        <div class="resume-actions">
            <a href="/assets/resume.pdf" download class="resume-link">&#8595; Download PDF</a>
            <a href="/assets/resume.pdf" target="_blank" rel="noopener noreferrer" class="resume-link">View in browser</a>
        </div>
    </div>
</div>

<script>
fetch('/assets/resume.pdf', { method: 'HEAD' })
    .then(function(response) {
        var lastModified = response.headers.get('Last-Modified');
        if (lastModified) {
            var date = new Date(lastModified);
            var formatted = date.toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
            document.getElementById('resume-last-updated').textContent = 'Updated ' + formatted;
        } else {
            document.getElementById('resume-last-updated').textContent = '';
        }
    })
    .catch(function() {
        document.getElementById('resume-last-updated').textContent = '';
    });
</script>
